module: tests

flags: [
    '-x', 'c++',
    '-std=c++17',
    '-I./src'
]

units:
  callbacks:
    source: 'src/callbacks.h'
    target: 'src/callbacks_py_auto.cpp'

specs:
  'function@functionWithCallback':
    params:
      a:
        facade:
          kind: vector
          length_param: count
      cb:
        facade:
          kind: callback
          context_param: context
